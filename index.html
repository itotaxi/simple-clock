<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clock</title>
<style>
  :root {
    --fg: oklch(0.22 0.01 250);
    --fg-muted: oklch(0.45 0.01 250);
    --fg-faint: oklch(0.65 0.008 250);
    --surface: oklch(0.985 0.003 250);
    --surface-2: oklch(0.96 0.005 250);
    --border: oklch(0.88 0.005 250);
    --accent: oklch(0.62 0.08 240);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    background: var(--surface);
    position: relative;
    display: grid;
    place-items: center;
    transition: background 600ms ease;
  }

  /* gradient layer */
  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    opacity: 1;
    transition: opacity 800ms ease;
  }
  body.bg-off .bg { opacity: 0; }

  .bg::before,
  .bg::after,
  .bg .blob {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    will-change: transform;
  }

  .bg::before {
    width: 60vmax;
    height: 60vmax;
    left: -15vmax;
    top: -20vmax;
    background: radial-gradient(circle at 30% 30%, oklch(0.88 0.07 240 / 0.85), transparent 60%);
    animation: drift1 24s ease-in-out infinite alternate;
  }
  .bg::after {
    width: 55vmax;
    height: 55vmax;
    right: -18vmax;
    bottom: -22vmax;
    background: radial-gradient(circle at 60% 60%, oklch(0.9 0.06 320 / 0.8), transparent 60%);
    animation: drift2 30s ease-in-out infinite alternate;
  }
  .bg .blob {
    width: 45vmax;
    height: 45vmax;
    left: 30%;
    top: 30%;
    background: radial-gradient(circle, oklch(0.92 0.05 180 / 0.55), transparent 60%);
    animation: drift3 36s ease-in-out infinite alternate;
  }

  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(8vmax, 6vmax) scale(1.08); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.05); }
    100% { transform: translate(-6vmax, -4vmax) scale(0.95); }
  }
  @keyframes drift3 {
    0%   { transform: translate(-10vmax, -6vmax) scale(0.95); }
    100% { transform: translate(10vmax, 8vmax) scale(1.1); }
  }

  /* clock */
  .clock {
    text-align: center;
    user-select: none;
    padding: 0 24px;
  }

  .time {
    font-size: clamp(64px, 16vw, 220px);
    font-weight: 200;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: baseline;
  }

  .time .sep {
    opacity: 0.35;
    margin: 0 0.04em;
    font-weight: 200;
  }

  .time .seconds {
    font-size: 0.6em;
    margin-left: 0.08em;
    color: var(--fg-muted);
    font-weight: 300;
    transition: opacity 400ms ease, max-width 400ms ease, margin 400ms ease;
    overflow: hidden;
    white-space: nowrap;
    display: inline-block;
    max-width: 4em;
    padding-right: 0.05em;
  }
  body.no-seconds .time .seconds {
    opacity: 0;
    max-width: 0;
    margin-left: 0;
  }

  .date {
    margin-top: 28px;
    font-size: clamp(13px, 1.4vw, 18px);
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-muted);
    font-variant-numeric: tabular-nums;
  }
  .date .dow {
    margin-left: 6px;
    color: var(--fg-faint);
  }

  /* top-left nav pill (FOCUS / back) */
  .nav-pill {
    position: fixed;
    top: 22px;
    left: 22px;
    height: 38px;
    padding: 0 16px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    font-family: inherit;
    cursor: pointer;
    transition: color 200ms, background 200ms, border-color 200ms;
    z-index: 10;
  }
  .nav-pill:hover {
    color: var(--fg);
    background: oklch(1 0 0 / 0.5);
    border-color: var(--border);
  }
  .nav-pill svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* settings button */
  .gear-btn {
    position: fixed;
    top: 22px;
    right: 22px;
    width: 38px;
    height: 38px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 50%;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: color 200ms, background 200ms, border-color 200ms, transform 300ms;
    z-index: 10;
  }
  .gear-btn:hover {
    color: var(--fg);
    background: oklch(1 0 0 / 0.5);
    border-color: var(--border);
    transform: rotate(45deg);
  }
  .gear-btn svg { width: 18px; height: 18px; }

  /* top-right secondary button (HISTORY) */
  .aux-btn {
    position: fixed;
    top: 22px;
    right: 22px;
    height: 38px;
    padding: 0 16px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 999px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    font-family: inherit;
    cursor: pointer;
    transition: color 200ms, background 200ms, border-color 200ms;
    z-index: 10;
  }
  .aux-btn:hover {
    color: var(--fg);
    background: oklch(1 0 0 / 0.5);
    border-color: var(--border);
  }

  /* settings panel */
  .panel {
    position: fixed;
    top: 70px;
    right: 22px;
    width: 260px;
    background: oklch(1 0 0 / 0.85);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 20px 50px -20px oklch(0.2 0.02 250 / 0.25),
                0 4px 12px -4px oklch(0.2 0.02 250 / 0.1);
    z-index: 11;
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    pointer-events: none;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .panel-header {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg-faint);
    padding: 10px 12px 6px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 150ms;
  }
  .row:hover { background: oklch(0.95 0.005 250 / 0.7); }
  .row-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--fg);
  }
  .row-hint {
    font-size: 11px;
    color: var(--fg-faint);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  /* toggle */
  .toggle {
    width: 36px;
    height: 20px;
    background: oklch(0.85 0.005 250);
    border-radius: 999px;
    position: relative;
    transition: background 200ms ease;
    flex-shrink: 0;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 1px 3px oklch(0.2 0.02 250 / 0.2);
    transition: transform 220ms cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .row.on .toggle {
    background: var(--accent);
  }
  .row.on .toggle::after {
    transform: translateX(16px);
  }

  body.bg-off { background: var(--surface); }

  /* ============================================================
     VIEW SYSTEM
     focus-view and history-view are position:fixed overlays.
     The clock <main> is hidden/shown via display:none.
  ============================================================ */
  .view {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 280ms ease;
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ============ Focus View ============ */
  .focus-view {
    padding: 80px 24px 48px;
    gap: 0;
  }

  .focus-clock {
    font-size: clamp(22px, 4vw, 42px);
    font-weight: 300;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted);
    user-select: none;
    margin-bottom: 28px;
    flex-shrink: 0;
  }
  .focus-clock .fc-sep {
    opacity: 0.45;
    margin: 0 0.08em;
  }

  .stopwatch-display {
    font-size: clamp(52px, 12vw, 160px);
    font-weight: 200;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: baseline;
    user-select: none;
    flex-shrink: 0;
  }
  .stopwatch-display .sw-sep {
    opacity: 0.35;
    margin: 0 0.04em;
    font-weight: 200;
  }

  .sw-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .sw-chevron {
    width: 30px;
    height: 30px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 6px;
    transition: color 180ms, background 180ms, border-color 180ms;
  }
  .sw-chevron:hover {
    color: var(--fg-muted);
    background: oklch(1 0 0 / 0.5);
    border-color: var(--border);
  }
  .sw-chevron svg {
    width: 14px;
    height: 14px;
    transition: transform 240ms ease;
  }
  .sw-chevron.open svg { transform: rotate(90deg); }

  .sw-adjust {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 260ms ease, opacity 200ms ease, margin-top 260ms ease;
    margin-top: 0;
  }
  .sw-adjust.open {
    max-height: 48px;
    opacity: 1;
    margin-top: 18px;
  }

  .adj-btn {
    height: 28px;
    padding: 0 10px;
    border: 1px solid var(--border);
    background: oklch(1 0 0 / 0.5);
    color: var(--fg-muted);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 140ms, color 140ms, border-color 140ms;
    white-space: nowrap;
  }
  .adj-btn:hover {
    background: oklch(1 0 0 / 0.88);
    color: var(--fg);
    border-color: oklch(0.75 0.005 250);
  }
  .adj-btn:active { transform: scale(0.95); }

  .task-area {
    margin-top: 28px;
    width: 100%;
    max-width: 600px;
    flex-shrink: 0;
  }

  .task-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-faint);
    text-align: center;
    margin-bottom: 12px;
  }

  .task-input {
    width: 100%;
    background: oklch(1 0 0 / 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 24px;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 300;
    font-family: inherit;
    color: var(--fg);
    text-align: center;
    resize: none;
    outline: none;
    line-height: 1.45;
    min-height: 72px;
    max-height: 160px;
    overflow-y: auto;
    transition: border-color 200ms, box-shadow 200ms;
  }
  .task-input:focus {
    border-color: oklch(0.62 0.08 240 / 0.6);
    box-shadow: 0 0 0 3px oklch(0.62 0.08 240 / 0.12);
  }
  .task-input::placeholder { color: var(--fg-faint); }

  .focus-controls {
    margin-top: 32px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  .ctrl-btn {
    height: 48px;
    padding: 0 28px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.09em;
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
    transition: background 150ms, box-shadow 150ms, transform 100ms;
  }
  .ctrl-btn:active { transform: scale(0.96); }

  .ctrl-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px -4px oklch(0.62 0.08 240 / 0.45);
    min-width: 110px;
  }
  .ctrl-primary:hover {
    background: oklch(0.56 0.09 240);
    box-shadow: 0 6px 20px -4px oklch(0.62 0.08 240 / 0.55);
  }
  .ctrl-primary.is-running {
    background: oklch(0.62 0.09 25);
    box-shadow: 0 4px 16px -4px oklch(0.62 0.09 25 / 0.45);
  }
  .ctrl-primary.is-running:hover {
    background: oklch(0.55 0.1 25);
  }

  .ctrl-secondary {
    background: oklch(1 0 0 / 0.65);
    color: var(--fg-muted);
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .ctrl-secondary:hover {
    background: oklch(1 0 0 / 0.88);
    color: var(--fg);
  }

  /* ============ History View ============ */
  .history-view {
    padding: 80px 24px 48px;
    align-items: stretch;
    overflow: hidden;
  }

  .history-container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .history-heading {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-faint);
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .history-scroll {
    overflow-y: auto;
    flex: 1;
    padding-bottom: 8px;
  }
  .history-scroll::-webkit-scrollbar { width: 4px; }
  .history-scroll::-webkit-scrollbar-track { background: transparent; }
  .history-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    grid-template-rows: auto auto;
    gap: 2px 12px;
    padding: 14px 14px 14px 18px;
    border-radius: 12px;
    background: oklch(1 0 0 / 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    transition: opacity 200ms ease;
  }
  .history-item.removing {
    opacity: 0;
    transform: scaleY(0.8);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  .history-task {
    font-size: 17px;
    font-weight: 300;
    color: var(--fg);
    grid-column: 1;
    grid-row: 1;
    word-break: break-word;
  }

  .history-duration {
    font-size: 18px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted);
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .history-date {
    font-size: 11px;
    color: var(--fg-faint);
    letter-spacing: 0.06em;
    grid-column: 1;
    grid-row: 2;
  }

  .history-delete {
    grid-column: 3;
    grid-row: 1 / 3;
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    align-self: center;
    transition: color 150ms, background 150ms;
    flex-shrink: 0;
  }
  .history-delete:hover {
    color: oklch(0.55 0.1 25);
    background: oklch(0.55 0.1 25 / 0.1);
  }
  .history-delete svg { width: 14px; height: 14px; pointer-events: none; }

  .history-empty {
    text-align: center;
    color: var(--fg-faint);
    font-size: 14px;
    padding: 60px 0;
  }

  .history-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .export-btn {
    height: 28px;
    padding: 0 12px;
    border: 1px solid var(--border);
    background: oklch(1 0 0 / 0.6);
    color: var(--fg-muted);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    font-family: inherit;
    cursor: pointer;
    transition: background 150ms, color 150ms;
  }
  .export-btn:hover {
    background: oklch(1 0 0 / 0.9);
    color: var(--fg);
  }

  /* export modal */
  .export-modal {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: oklch(0.2 0.01 250 / 0.3);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms ease;
  }
  .export-modal.open {
    opacity: 1;
    pointer-events: auto;
  }

  .export-dialog {
    width: 100%;
    max-width: 560px;
    max-height: calc(100vh - 80px);
    background: oklch(1 0 0 / 0.92);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 24px 60px -16px oklch(0.2 0.02 250 / 0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(8px) scale(0.98);
    transition: transform 220ms ease;
  }
  .export-modal.open .export-dialog {
    transform: translateY(0) scale(1);
  }

  .export-dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .export-dialog-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--fg-muted);
  }
  .export-close {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--fg-faint);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 150ms, background 150ms;
  }
  .export-close:hover {
    color: var(--fg);
    background: var(--surface-2);
  }
  .export-close svg { width: 14px; height: 14px; }

  .export-textarea {
    flex: 1;
    width: 100%;
    min-height: 280px;
    max-height: 60vh;
    padding: 20px;
    font-size: 14px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    line-height: 1.8;
    color: var(--fg);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
  }

  /* responsive */
  @media (max-width: 480px) {
    .nav-pill { top: 14px; left: 14px; }
    .gear-btn { top: 14px; right: 14px; }
    .aux-btn { top: 14px; right: 14px; }
    .panel { width: calc(100vw - 28px); right: 14px; }
    .date { margin-top: 18px; }
    .focus-view { padding: 70px 16px 36px; }
    .history-view { padding: 70px 16px 36px; }
    .ctrl-btn { height: 44px; padding: 0 22px; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"><div class="blob"></div></div>

  <!-- Clock view -->
  <main class="clock" id="view-clock" role="main">
    <div class="time" id="time" aria-live="polite">
      <span id="hh">00</span><span class="sep">:</span><span id="mm">00</span><span class="seconds"><span class="sep">:</span><span id="ss">00</span></span>
    </div>
    <div class="date">
      <span id="date">----/--/--</span><span class="dow" id="dow">(-)</span>
    </div>
  </main>

  <!-- Focus view -->
  <div class="view focus-view" id="view-focus" aria-hidden="true">
    <div class="focus-clock">
      <span id="fc-hh">00</span><span class="fc-sep">:</span><span id="fc-mm">00</span>
    </div>
    <div class="sw-row">
      <div class="stopwatch-display">
        <span id="sw-h">00</span><span class="sw-sep">:</span><span id="sw-m">00</span><span class="sw-sep">:</span><span id="sw-s">00</span>
      </div>
      <button class="sw-chevron" id="sw-chevron-btn" aria-label="時間を調整">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="sw-adjust" id="sw-adjust">
      <button class="adj-btn" data-delta="-600">－10分</button>
      <button class="adj-btn" data-delta="-300">－5分</button>
      <button class="adj-btn" data-delta="-60">－1分</button>
      <button class="adj-btn" data-delta="60">＋1分</button>
      <button class="adj-btn" data-delta="300">＋5分</button>
      <button class="adj-btn" data-delta="600">＋10分</button>
    </div>
    <div class="task-area">
      <div class="task-label">いま何に集中してる？</div>
      <textarea class="task-input" id="task-input" rows="2" placeholder="タスクを入力…"></textarea>
    </div>
    <div class="focus-controls">
      <button class="ctrl-btn ctrl-primary" id="start-stop-btn">START</button>
      <button class="ctrl-btn ctrl-secondary" id="next-task-btn">次のタスクへ</button>
    </div>
  </div>

  <!-- History view -->
  <div class="view history-view" id="view-history" aria-hidden="true">
    <div class="history-container">
      <div class="history-toolbar">
        <div class="history-heading" style="margin-bottom:0">Focus History</div>
        <button class="export-btn" id="export-btn">エクスポート</button>
      </div>
      <div class="history-scroll" id="history-list"></div>
    </div>
  </div>

  <!-- Export modal -->
  <div class="export-modal" id="export-modal" aria-hidden="true">
    <div class="export-dialog">
      <div class="export-dialog-header">
        <span class="export-dialog-title">エクスポート</span>
        <button class="export-close" id="export-close" aria-label="閉じる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <textarea class="export-textarea" id="export-textarea" readonly spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Top-left nav: FOCUS button (clock view) / back button (other views) -->
  <button class="nav-pill" id="focus-btn" aria-label="フォーカスモードへ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3" opacity="0.45"/>
      <circle cx="12" cy="12" r="8" opacity="0.3"/>
    </svg>
    FOCUS
  </button>

  <button class="nav-pill" id="back-btn" style="display:none" aria-label="戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    戻る
  </button>

  <!-- Top-right: gear (clock view) / HISTORY (focus view) -->
  <button class="gear-btn" id="gear" aria-label="設定" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>

  <button class="aux-btn" id="history-btn" style="display:none" aria-label="履歴を見る">HISTORY</button>

  <div class="panel" id="panel" role="dialog" aria-label="表示設定">
    <div class="panel-header">表示設定</div>
    <div class="row" id="row-seconds" role="switch" aria-checked="true" tabindex="0">
      <div>
        <div class="row-label">秒を表示</div>
        <div class="row-hint">HH:MM:SS / HH:MM</div>
      </div>
      <div class="toggle" aria-hidden="true"></div>
    </div>
    <div class="row" id="row-bg" role="switch" aria-checked="true" tabindex="0">
      <div>
        <div class="row-label">背景グラデーション</div>
        <div class="row-hint">淡く漂う背景のON/OFF</div>
      </div>
      <div class="toggle" aria-hidden="true"></div>
    </div>
  </div>

<script>
(function () {
  const pad = (n) => String(n).padStart(2, '0');
  const DOW = ['日', '月', '火', '水', '木', '金', '土'];

  // ── Clock ──────────────────────────────────────────────────
  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const dateEl = document.getElementById('date');
  const dowEl = document.getElementById('dow');
  const fcHH = document.getElementById('fc-hh');
  const fcMM = document.getElementById('fc-mm');

  function tick() {
    const d = new Date();
    hh.textContent = pad(d.getHours());
    mm.textContent = pad(d.getMinutes());
    ss.textContent = pad(d.getSeconds());
    dateEl.textContent = `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
    dowEl.textContent = `(${DOW[d.getDay()]})`;
    fcHH.textContent = pad(d.getHours());
    fcMM.textContent = pad(d.getMinutes());
  }
  tick();
  setTimeout(() => { tick(); setInterval(tick, 1000); }, 1000 - (Date.now() % 1000));

  // ── Settings ───────────────────────────────────────────────
  const STORE_KEY = 'simple-clock-settings';
  const defaults = { showSeconds: true, showBg: true };
  let state = { ...defaults };
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = { ...defaults, ...JSON.parse(raw) };
  } catch (e) {}

  const body = document.body;
  const rowSeconds = document.getElementById('row-seconds');
  const rowBg = document.getElementById('row-bg');

  function applySettings() {
    body.classList.toggle('no-seconds', !state.showSeconds);
    body.classList.toggle('bg-off', !state.showBg);
    rowSeconds.classList.toggle('on', state.showSeconds);
    rowSeconds.setAttribute('aria-checked', String(state.showSeconds));
    rowBg.classList.toggle('on', state.showBg);
    rowBg.setAttribute('aria-checked', String(state.showBg));
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  applySettings();

  function bindToggle(el, key) {
    const flip = () => { state[key] = !state[key]; applySettings(); };
    el.addEventListener('click', flip);
    el.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
    });
  }
  bindToggle(rowSeconds, 'showSeconds');
  bindToggle(rowBg, 'showBg');

  const gear = document.getElementById('gear');
  const panel = document.getElementById('panel');
  let panelOpen = false;
  function setPanelOpen(v) {
    panelOpen = v;
    panel.classList.toggle('open', v);
    gear.setAttribute('aria-expanded', String(v));
  }
  gear.addEventListener('click', (e) => { e.stopPropagation(); setPanelOpen(!panelOpen); });
  document.addEventListener('click', (e) => {
    if (!panelOpen) return;
    if (!panel.contains(e.target) && e.target !== gear) setPanelOpen(false);
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && panelOpen) setPanelOpen(false);
  });

  // ── View switching ─────────────────────────────────────────
  const viewClock   = document.getElementById('view-clock');
  const viewFocus   = document.getElementById('view-focus');
  const viewHistory = document.getElementById('view-history');
  const focusBtn    = document.getElementById('focus-btn');
  const backBtn     = document.getElementById('back-btn');
  const historyBtn  = document.getElementById('history-btn');

  let currentView = 'clock';

  function showView(name) {
    const isClock   = name === 'clock';
    const isFocus   = name === 'focus';
    const isHistory = name === 'history';

    viewClock.style.display = isClock ? '' : 'none';
    viewFocus.classList.toggle('active', isFocus);
    viewFocus.setAttribute('aria-hidden', String(!isFocus));
    viewHistory.classList.toggle('active', isHistory);
    viewHistory.setAttribute('aria-hidden', String(!isHistory));

    focusBtn.style.display   = isClock  ? '' : 'none';
    backBtn.style.display    = !isClock ? '' : 'none';
    historyBtn.style.display = isFocus  ? '' : 'none';
    gear.style.display       = isClock  ? '' : 'none';

    if (!isClock && panelOpen) setPanelOpen(false);
    if (isHistory) renderHistory();

    currentView = name;
  }

  focusBtn.addEventListener('click', () => showView('focus'));
  backBtn.addEventListener('click', () => {
    showView(currentView === 'history' ? 'focus' : 'clock');
  });
  historyBtn.addEventListener('click', () => showView('history'));

  // ── Stopwatch ──────────────────────────────────────────────
  const HISTORY_KEY = 'simple-clock-focus-history';

  let swElapsed  = 0;
  let swRunning  = false;
  let swTimer    = null;
  let swStartDate = null;

  const swH          = document.getElementById('sw-h');
  const swM          = document.getElementById('sw-m');
  const swS          = document.getElementById('sw-s');
  const startStopBtn = document.getElementById('start-stop-btn');
  const nextTaskBtn  = document.getElementById('next-task-btn');
  const taskInput    = document.getElementById('task-input');

  function fmtElapsed(secs) {
    return `${pad(Math.floor(secs / 3600))}:${pad(Math.floor((secs % 3600) / 60))}:${pad(secs % 60)}`;
  }

  function updateSwDisplay() {
    swH.textContent = pad(Math.floor(swElapsed / 3600));
    swM.textContent = pad(Math.floor((swElapsed % 3600) / 60));
    swS.textContent = pad(swElapsed % 60);
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
  }

  function startSw() {
    if (swRunning) return;
    if (swElapsed === 0) swStartDate = todayStr();
    swRunning = true;
    swTimer = setInterval(() => { swElapsed++; updateSwDisplay(); }, 1000);
    startStopBtn.textContent = 'STOP';
    startStopBtn.classList.add('is-running');
  }

  function stopSw() {
    if (!swRunning) return;
    swRunning = false;
    clearInterval(swTimer);
    swTimer = null;
    startStopBtn.textContent = 'START';
    startStopBtn.classList.remove('is-running');
  }

  function resetSw() {
    stopSw();
    swElapsed = 0;
    swStartDate = null;
    updateSwDisplay();
  }

  function saveToHistory() {
    if (swElapsed === 0) return;
    const entry = {
      date:     swStartDate || todayStr(),
      duration: fmtElapsed(swElapsed),
      task:     taskInput.value.trim() || '（タスク名なし）',
    };
    let history = [];
    try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) history = JSON.parse(raw); } catch (e) {}
    history.unshift(entry);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
  }

  startStopBtn.addEventListener('click', () => { if (swRunning) stopSw(); else startSw(); });

  const swChevronBtn = document.getElementById('sw-chevron-btn');
  const swAdjust     = document.getElementById('sw-adjust');
  swChevronBtn.addEventListener('click', () => {
    const open = swAdjust.classList.toggle('open');
    swChevronBtn.classList.toggle('open', open);
  });

  swAdjust.addEventListener('click', (e) => {
    const btn = e.target.closest('.adj-btn');
    if (!btn) return;
    const delta = Number(btn.dataset.delta);
    swElapsed = Math.max(0, swElapsed + delta);
    if (swElapsed === 0) swStartDate = null;
    updateSwDisplay();
  });

  nextTaskBtn.addEventListener('click', () => {
    saveToHistory();
    resetSw();
    taskInput.value = '';
    taskInput.style.height = '';
  });

  taskInput.addEventListener('input', () => {
    taskInput.style.height = 'auto';
    taskInput.style.height = Math.min(taskInput.scrollHeight, 160) + 'px';
  });

  // ── History rendering ──────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  const DELETE_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>`;

  function renderHistory() {
    const list = document.getElementById('history-list');
    let history = [];
    try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) history = JSON.parse(raw); } catch (e) {}
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">まだ記録がありません</div>';
      return;
    }
    list.innerHTML = history.map((item, i) => `
      <div class="history-item" data-index="${i}">
        <div class="history-task">${escHtml(item.task)}</div>
        <div class="history-duration">${escHtml(item.duration)}</div>
        <div class="history-date">${escHtml(item.date)}</div>
        <button class="history-delete" data-index="${i}" aria-label="削除">${DELETE_SVG}</button>
      </div>
    `).join('');
  }

  document.getElementById('history-list').addEventListener('click', (e) => {
    const btn = e.target.closest('.history-delete');
    if (!btn) return;
    const idx = Number(btn.dataset.index);
    let history = [];
    try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) history = JSON.parse(raw); } catch (e) {}
    const el = btn.closest('.history-item');
    el.classList.add('removing');
    setTimeout(() => {
      history.splice(idx, 1);
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch (e) {}
      renderHistory();
    }, 180);
  });

  // ── Export modal ───────────────────────────────────────────
  const exportModal   = document.getElementById('export-modal');
  const exportBtn     = document.getElementById('export-btn');
  const exportClose   = document.getElementById('export-close');
  const exportTextarea = document.getElementById('export-textarea');

  function formatExport(history) {
    const groups = new Map();
    for (const item of history) {
      if (!groups.has(item.date)) groups.set(item.date, []);
      groups.get(item.date).push(item);
    }
    return Array.from(groups.entries())
      .map(([date, items]) =>
        date + '\n' + items.map(item => `・${item.task}　${item.duration}`).join('\n')
      )
      .join('\n\n');
  }

  function openExportModal() {
    let history = [];
    try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) history = JSON.parse(raw); } catch (e) {}
    exportTextarea.value = history.length > 0 ? formatExport(history) : '';
    exportModal.classList.add('open');
    exportModal.setAttribute('aria-hidden', 'false');
    exportTextarea.select();
  }

  function closeExportModal() {
    exportModal.classList.remove('open');
    exportModal.setAttribute('aria-hidden', 'true');
  }

  exportBtn.addEventListener('click', openExportModal);
  exportClose.addEventListener('click', closeExportModal);
  exportModal.addEventListener('click', (e) => {
    if (e.target === exportModal) closeExportModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && exportModal.classList.contains('open')) closeExportModal();
  });

  updateSwDisplay();
})();
</script>
</body>
</html>
